name: release

# Baut das Container-Image bei jedem semver-Tag (v*.*.*) und pusht es nach
# GitHub Container Registry (ghcr.io). Sichtbarkeit des Package muss einmalig
# in den Repo/Owner-Einstellungen auf "private" gesetzt werden (Settings →
# Packages → secscan → Change visibility). Workflow selbst pusht nur, er
# verändert die Sichtbarkeit nicht.

on:
  push:
    tags:
      - "v*.*.*"
  # Manuelles Re-Build eines bestehenden Tags möglich, ohne neuen Tag zu
  # erzeugen. Image-Tag wird aus dem Input gelesen.
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag oder SHA, das gebaut werden soll (z.B. v0.2.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # owner-name wird lowercased; ghcr akzeptiert nur Kleinbuchstaben im Pfad.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set lowercase image name
        id: image
        run: |
          # ghcr verlangt Kleinbuchstaben im Pfad.
          echo "name=${REGISTRY,,}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          # Bei semver-Tag v0.2.0: ghcr-Tags `0.2.0`, `0.2`, `0`, `latest`.
          # Plus der raw `v0.2.0`-Tag, falls jemand exakt zitieren will.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=secscan
            org.opencontainers.image.description=Self-hosted Trivy filesystem-scan triage
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub-Actions-Cache: spart Buildtime bei wiederholten Builds um
          # Größenordnungen, weil pip-Layer + apt-Layer wiederverwendet werden.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance-Attestations für Software-Supply-Chain. Sind ohnehin
          # ghcr-Default ab buildx-0.10, hier explizit.
          provenance: true
          sbom: true

      - name: Print pushed image digest
        run: |
          echo "Image: ${{ steps.image.outputs.name }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
