name: release

# Baut das Container-Image und pusht es nach GitHub Container Registry
# (ghcr.io). Zwei Trigger-Pfade:
#
#  - **Tag-Push** (`v*.*.*`): voller Semver-Release. Tags `0.9.7`, `0.9`, `0`,
#    `latest`, `v0.9.7` werden gesetzt.
#  - **main-Push**: Dev-Builds mit `sha-<short>`-Tag. Damit kann der Operator
#    bei Bedarf einen unreleased Commit deployen ohne extra-Tag setzen zu
#    muessen. `latest` bleibt unberuehrt (zeigt weiter auf den letzten
#    semver-Release).
#
# Sichtbarkeit des Package muss einmalig in den Repo/Owner-Einstellungen auf
# "private" gesetzt werden (Settings → Packages → fathometer → Change
# visibility). Workflow selbst pusht nur, er verändert die Sichtbarkeit nicht.

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  # Manuelles Re-Build eines bestehenden Tags möglich, ohne neuen Tag zu
  # erzeugen. Image-Tag wird aus dem Input gelesen.
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag oder SHA, das gebaut werden soll (z.B. v0.2.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # owner-name wird lowercased; ghcr akzeptiert nur Kleinbuchstaben im Pfad.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set lowercase image name
        id: image
        run: |
          # ghcr verlangt Kleinbuchstaben im Pfad.
          echo "name=${REGISTRY,,}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          # arm64 temporaer aus: QEMU-Emulation auf amd64-Runner ist
          # 5-10x langsamer als nativ. Aktueller Deploy-Pfad (k8s-Cluster)
          # ist amd64-only. Reaktivieren wenn arm64-Deploy gebraucht wird —
          # dann besser `runs-on: ubuntu-24.04-arm` als zweiter Matrix-Job
          # statt QEMU-Emulation.
          platforms: linux/amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          # Tag-Push (v0.2.0): ghcr-Tags `0.2.0`, `0.2`, `0`, `latest`,
          #   `v0.2.0` (raw).
          # main-Push: nur `sha-<short>` (z.B. `sha-3962ac6`). Kein latest,
          #   kein semver — soll keine "Stable Release"-Erwartung wecken.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag
            type=sha,format=short,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=fathometer
            org.opencontainers.image.description=Self-hosted Trivy filesystem-scan triage
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub-Actions-Cache mit expliziter Scope: ohne `scope` wird
          # default per GITHUB_REF separiert — jeder Tag-Build (refs/tags/
          # vX.Y.Z) bekommt eigenen Cache und startet bei null. Mit fixem
          # `scope=release` teilen alle Release-Builds denselben Cache, sodass
          # pyproject.toml-Layer + apt-Layer ueber Tag-Grenzen hinweg gehittet
          # werden. Cache wird automatisch nach 7 Tagen ohne Hit evictet
          # (GHA-LRU). System-Lib-Security-Updates kommen via Base-Image-Push
          # (`python:3.13-slim-bookworm`-Digest aendert sich) → Layer-Hash
          # invalidiert automatisch.
          cache-from: type=gha,scope=release
          cache-to: type=gha,scope=release,mode=max
          # Provenance-Attestations für Software-Supply-Chain. Sind ohnehin
          # ghcr-Default ab buildx-0.10, hier explizit.
          provenance: true
          sbom: true

      - name: Print pushed image digest
        run: |
          echo "Image: ${{ steps.image.outputs.name }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
