name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Minimal permissions for the GITHUB_TOKEN used by the action.
permissions:
  actions: write
  contents: write        # needed to write the signatures file in this repo
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # If you store signatures in a SEPARATE (private) repo, set a PAT here
          # and uncomment remote-* below. Recommended when this repo is public,
          # so contributor names/emails are not committed to the public repo.
          # PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_PAT }}
        with:
          # Where signatures are recorded (JSON). Default: this repo.
          path-to-signatures: "signatures/version1/cla.json"
          # The CLA document contributors agree to.
          path-to-document: "https://github.com/THEKROLL-LTD/SecScanUI/blob/main/CLA.md"
          branch: "main"
          # Exact phrase contributors must comment to sign:
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-notsigned-prcomment: "Thank you for your contribution. Before we can merge it, please read our [CLA](https://github.com/THEKROLL-LTD/SecScanUI/blob/main/CLA.md) and sign it by posting the comment below."
          # Bots / accounts that never need to sign:
          allowlist: "dependabot[bot],github-actions[bot]"
          # To store signatures in a separate private repo instead of this one,
          # set PERSONAL_ACCESS_TOKEN above and uncomment:
          # remote-organization-name: "THEKROLL-LTD"
          # remote-repository-name: "cla-signatures"
