# Ruff-Konfiguration für fathometer
# Siehe CLAUDE.md: ruff check . && ruff format --check . muss grün sein.

line-length = 100
target-version = "py313"

extend-exclude = [
    "alembic/versions",
    "agent",
    # Operator-Probe-Scripts (v0.9.3-Block-P-Modell-Verifikation,
    # v0.9.4-response-format-Diagnose). Nicht Teil des deploybaren
    # Codes — Lint-Strenge ist hier zu strikt.
    "probe_gpt_oss.py",
    "probe_response_format.py",
]

[lint]
# Strikte aber pragmatische Auswahl.
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
    "N",   # pep8-naming
    "S",   # flake8-bandit (Security)
    "C4",  # flake8-comprehensions
    "PIE", # flake8-pie
    "PTH", # flake8-use-pathlib
]
ignore = [
    "E501",  # line-length — wird vom Formatter erzwungen
    "S101",  # assert in Tests ist ok
]

[lint.per-file-ignores]
"tests/**" = ["S101", "S105", "S106", "S603", "S607"]
"alembic/env.py" = ["E402"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
