{# Wiederverwendbares Step-Indicator-Macro fuer den Setup-Wizard.
   Verwendung: {% from "setup/_wizard.html" import step_indicator %}
               {{ step_indicator(current=1) }}
#}
{% macro step_indicator(current) %}
  <ul class="steps w-full mb-8">
    <li class="step {% if current >= 1 %}step-primary{% endif %}">Admin</li>
    <li class="step {% if current >= 2 %}step-primary{% endif %}">Master-Key</li>
    <li class="step {% if current >= 3 %}step-primary{% endif %}">Defaults</li>
  </ul>
{% endmacro %}
