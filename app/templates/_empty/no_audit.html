{# Empty-State: Audit-Log leer (Block I §7a).

   Erwartete Variablen: keine.
#}
<div class="p-6">
  <div class="card bg-base-100 shadow-sm max-w-2xl" data-empty="no_audit">
    <div class="card-body">
      <h2 class="card-title text-base">No audit events</h2>
      <p class="text-sm opacity-80">
        Add a server or perform an action to populate the audit log.
      </p>
      <div class="card-actions mt-2">
        <a href="{{ url_for('servers.list_servers') }}"
           hx-get="{{ url_for('servers.list_servers') }}"
           hx-target="#detail-pane"
           hx-push-url="true"
           class="btn btn-sm btn-ghost">Go to server management</a>
      </div>
    </div>
  </div>
</div>
