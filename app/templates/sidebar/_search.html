{# Sidebar Filter-Input (Phase C, Block W — Redesign).
   Plain-CSS-Klassen (kein Tailwind/DaisyUI).
   Keybinding: `/` fokussiert dieses Input (sidebar_viewport.js).
   Esc leert + entfokussiert (Alpine).
#}
<div class="sidebar__filter" id="sidebar-search">
  <label class="sr-only" for="sidebar-search-input">filter hosts</label>
  <input id="sidebar-search-input"
         type="search"
         name="q"
         class="sidebar__input"
         placeholder="filter hosts                                       ( / )"
         aria-label="filter hosts"
         autocomplete="off"
         x-ref="searchInput"
         x-model="query"
         @input="onInput()"
         @keydown.escape.prevent="clear()" />
</div>
