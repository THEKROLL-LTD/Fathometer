[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
filterwarnings =
    error
    ignore::DeprecationWarning:flask_limiter.*
    ignore::ResourceWarning:psycopg.*
    ignore::pytest.PytestUnraisableExceptionWarning
markers =
    bench: Performance-Mini-Bench (Block M, ADR-0020) — Default ausgeschlossen via `-m "not bench"`.
    integration: Docker-/E2E-Integrationstest (Block N, ADR-0021) — Default ausgeschlossen via `-m "not bench and not integration"`.
    acceptance: Tests mit echter Postgres-DB oder Live-Services. Default ausgeschlossen — laufen nur bei RC-Vorbereitung. Auto-Marking via tests/conftest.py.
    db_integration: Tests, die absichtlich echte DB-/Migration-/Transaktionssemantik pruefen und nicht sinnvoll gemockt werden sollen.
    todo_mock: Tests die heute noch echte DB benutzen aber zu Mocks refactored werden sollen. Bleiben aktiv, sind nur zum Wiederfinden markiert.
addopts = -ra --strict-markers -m "not bench and not integration and not acceptance"
