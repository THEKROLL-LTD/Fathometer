[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
filterwarnings =
    error
    ignore::DeprecationWarning:flask_limiter.*
    ignore::ResourceWarning:psycopg.*
    ignore::pytest.PytestUnraisableExceptionWarning
addopts = -ra --strict-markers
