[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
filterwarnings =
    error
    ignore::DeprecationWarning:flask_limiter.*
    ignore::ResourceWarning:psycopg.*
    ignore::pytest.PytestUnraisableExceptionWarning
markers =
    bench: Performance-Mini-Bench (Block M, ADR-0020) — Default ausgeschlossen via `-m "not bench"`.
addopts = -ra --strict-markers -m "not bench"
