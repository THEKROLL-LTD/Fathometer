[mypy]
python_version = 3.13
strict = True
files = app
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_reexport = True
show_error_codes = True
# Decorators aus Flask/Flask-Login sind untyped — wir verzichten auf den
# Strict-Check dafuer, statt jede Route mit `# type: ignore[misc]` zu pflastern.
disallow_untyped_decorators = False
disallow_subclassing_any = False

# Externe Libraries ohne vollständige Stubs.
[mypy-flask_limiter.*]
ignore_missing_imports = True

[mypy-flask_login.*]
ignore_missing_imports = True

[mypy-flask_wtf.*]
ignore_missing_imports = True

[mypy-wtforms.*]
ignore_missing_imports = True

[mypy-argon2.*]
ignore_missing_imports = True
