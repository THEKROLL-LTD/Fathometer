[mypy]
python_version = 3.13
strict = True
files = app
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_reexport = True
show_error_codes = True

# Externe Libraries ohne vollständige Stubs.
# Weitere Eintraege (flask_login, flask_wtf, nh3, argon2) folgen in Block B/C,
# wenn die jeweiligen Imports tatsaechlich auftreten.
[mypy-flask_limiter.*]
ignore_missing_imports = True
