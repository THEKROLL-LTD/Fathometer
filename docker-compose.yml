# docker-compose-Setup fuer fathometer (lokal und Single-Node-Hosting).
# Zwei Services: `app` (Flask + Gunicorn) und `db` (Postgres 17).
# Production-Empfehlung: Reverse-Proxy davor (nginx/Caddy/Traefik) — siehe
# ARCHITECTURE.md §9.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fathometer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fathometer}
      POSTGRES_DB: ${POSTGRES_DB:-fathometer}
    volumes:
      - fathometer-db:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "${POSTGRES_USER:-fathometer}" -d "${POSTGRES_DB:-fathometer}"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FM_ENCRYPTION_KEY: ${FM_ENCRYPTION_KEY}
      FM_SECRET_KEY: ${FM_SECRET_KEY}
      FM_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-fathometer}:${POSTGRES_PASSWORD:-fathometer}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-fathometer}
      FM_MAX_BODY_MB: ${FM_MAX_BODY_MB:-10}
      FM_MAX_DECOMPRESSED_MB: ${FM_MAX_DECOMPRESSED_MB:-100}
      FM_RATELIMIT_REGISTER: ${FM_RATELIMIT_REGISTER:-10/minute}
      FM_RATELIMIT_LOGIN: ${FM_RATELIMIT_LOGIN:-5/minute}
      FM_RATELIMIT_SCANS_UNAUTH: ${FM_RATELIMIT_SCANS_UNAUTH:-20/minute}
      FM_RATELIMIT_SCANS_AUTH: ${FM_RATELIMIT_SCANS_AUTH:-60/hour}
      FM_GUNICORN_WORKERS: ${FM_GUNICORN_WORKERS:-2}
      FM_GUNICORN_THREADS: ${FM_GUNICORN_THREADS:-8}
      FM_GUNICORN_TIMEOUT: ${FM_GUNICORN_TIMEOUT:-120}
      FM_LOG_LEVEL: ${FM_LOG_LEVEL:-INFO}
      # Block R (ADR-0026) — Async-Ingest Per-Server-Soft-Cap.
      FM_MAX_QUEUED_INGEST_JOBS: ${FM_MAX_QUEUED_INGEST_JOBS:-50}
      # Block AI (ADR-0063) — Upstream-Check-Cache-TTL (vom Enqueue im
      # web-Container gelesen; Feature default-off via Setting).
      FM_UPSTREAM_CHECK_TTL_DAYS: ${FM_UPSTREAM_CHECK_TTL_DAYS:-14}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Block P (ADR-0023): asynchroner LLM-Risk-Reviewer-Worker.
  # Eigener Container ohne eingehende Ports — nur DB-Connect und LLM-
  # Provider-Egress (HTTPS via openai-SDK). Image und Build-Context sind
  # identisch zum `app`-Service; der Worker laeuft mit anderem Entrypoint
  # (`python -m app.workers.llm_worker`). Healthcheck ist ein interner
  # Python-Aufruf, kein HTTP — siehe `app/workers/healthcheck.py`.
  # Worker-Settings (Mode, Token-Budget, Reset-At) leben auf der
  # Singleton-`settings`-Zeile und werden dort vom Web-Container
  # geaendert — der Worker liest sie im Tick.
  fathometer-llm-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Block R (ADR-0026): Worker wartet auf `app: service_healthy` — die App
    # laeuft `alembic upgrade head` im Entrypoint und schaltet erst danach
    # auf healthy. Ohne diese Reihenfolge sieht der Worker beim Cold-Start
    # `relation "scan_ingest_jobs" does not exist` (50+ Errors bis die App
    # Migration angewendet hat). Mit `app: service_healthy` ist Migration
    # garantiert vor dem ersten Worker-Tick.
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    entrypoint: ["python", "-m", "app.workers.llm_worker"]
    environment:
      FM_ENCRYPTION_KEY: ${FM_ENCRYPTION_KEY}
      FM_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-fathometer}:${POSTGRES_PASSWORD:-fathometer}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-fathometer}
      FM_WORKER_POLL_INTERVAL_SEC: ${FM_WORKER_POLL_INTERVAL_SEC:-2.0}
      FM_WORKER_STALE_TIMEOUT_MIN: ${FM_WORKER_STALE_TIMEOUT_MIN:-10}
      FM_LLM_TOKEN_BUDGET_DAILY: ${FM_LLM_TOKEN_BUDGET_DAILY:-1000000}
      FM_LLM_CACHE_TTL_DAYS: ${FM_LLM_CACHE_TTL_DAYS:-30}
      FM_LLM_CACHE_MAX_ROWS: ${FM_LLM_CACHE_MAX_ROWS:-100000}
      FM_LOG_LEVEL: ${FM_LOG_LEVEL:-INFO}
      # Block R (ADR-0026) — Async-Ingest Worker-Sub-Tick-Konstanten.
      FM_SCAN_INGEST_MAX_ATTEMPTS: ${FM_SCAN_INGEST_MAX_ATTEMPTS:-3}
      FM_SCAN_INGEST_STALE_TIMEOUT_MIN: ${FM_SCAN_INGEST_STALE_TIMEOUT_MIN:-5}
      FM_SCAN_INGEST_RETENTION_INTERVAL_SEC: ${FM_SCAN_INGEST_RETENTION_INTERVAL_SEC:-3600}
    healthcheck:
      # timeout: 10s — Cold-Python-Process + DB-Connect liegt unter ARM64-RKE2
      # bei ~6s gemessen (v0.9.4-Befund). 5s waren zu knapp und produzierten
      # false-unhealthy trotz funktionalem Worker. Heartbeat-Cadence intern
      # ist 10s, Schwellwert im Healthcheck 30s — die Probe-Latenz selbst
      # ist davon entkoppelt.
      test: ["CMD", "python", "-m", "app.workers.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Block AI (ADR-0063): optionaler, operator-gated Research-Worker fuer die
  # agentische Upstream-Update-Suche. Gleiches Image wie app/llm-worker,
  # eigener Entrypoint, KEINE eingehenden Ports. Pollt ausschliesslich
  # `upstream_check_results` (Queue+Cache in einer Tabelle) — fasst `llm_jobs`
  # NICHT an (saubere Trennung vom Risk-Reviewer). Macht **Outbound** (Such-
  # Backend + agent-gefetchte Release-/Repo-URLs) — daher die Air-Gap-Regel:
  # **diesen Service in air-gap-Deployments einfach weglassen** (das Feature ist
  # ohnehin default-off via `Setting.upstream_check_enabled`). Laeuft das Feature
  # off, claimt der Worker nichts bzw. markiert `not_configured` und idlet.
  # Healthcheck ist ein interner Python-Aufruf (Heartbeat), kein HTTP.
  fathometer-research-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Wartet wie der llm-worker auf `app: service_healthy` — die App fuehrt
    # `alembic upgrade head` im Entrypoint aus; ohne diese Reihenfolge saehe der
    # Worker beim Cold-Start `relation "upstream_check_results" does not exist`.
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    entrypoint: ["python", "-m", "app.workers.research_worker"]
    environment:
      FM_ENCRYPTION_KEY: ${FM_ENCRYPTION_KEY}
      FM_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-fathometer}:${POSTGRES_PASSWORD:-fathometer}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-fathometer}
      FM_RESEARCH_WORKER_POLL_INTERVAL_SEC: ${FM_RESEARCH_WORKER_POLL_INTERVAL_SEC:-5.0}
      FM_RESEARCH_WORKER_MAX_ATTEMPTS: ${FM_RESEARCH_WORKER_MAX_ATTEMPTS:-3}
      FM_RESEARCH_WORKER_STALE_TIMEOUT_MIN: ${FM_RESEARCH_WORKER_STALE_TIMEOUT_MIN:-10}
      FM_UPSTREAM_CHECK_TTL_DAYS: ${FM_UPSTREAM_CHECK_TTL_DAYS:-14}
      FM_LOG_LEVEL: ${FM_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-m", "app.workers.research_healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fathometer-db:
