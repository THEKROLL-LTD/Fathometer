# docker-compose-Setup fuer secscan (lokal und Single-Node-Hosting).
# Zwei Services: `app` (Flask + Gunicorn) und `db` (Postgres 17).
# Production-Empfehlung: Reverse-Proxy davor (nginx/Caddy/Traefik) — siehe
# ARCHITECTURE.md §9.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secscan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secscan}
      POSTGRES_DB: ${POSTGRES_DB:-secscan}
    volumes:
      - secscan-db:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "${POSTGRES_USER:-secscan}" -d "${POSTGRES_DB:-secscan}"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECSCAN_ENCRYPTION_KEY: ${SECSCAN_ENCRYPTION_KEY}
      SECSCAN_SECRET_KEY: ${SECSCAN_SECRET_KEY}
      SECSCAN_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-secscan}:${POSTGRES_PASSWORD:-secscan}@db:5432/${POSTGRES_DB:-secscan}
      SECSCAN_MAX_BODY_MB: ${SECSCAN_MAX_BODY_MB:-10}
      SECSCAN_MAX_DECOMPRESSED_MB: ${SECSCAN_MAX_DECOMPRESSED_MB:-100}
      SECSCAN_RATELIMIT_REGISTER: ${SECSCAN_RATELIMIT_REGISTER:-10/minute}
      SECSCAN_RATELIMIT_LOGIN: ${SECSCAN_RATELIMIT_LOGIN:-5/minute}
      SECSCAN_RATELIMIT_SCANS_UNAUTH: ${SECSCAN_RATELIMIT_SCANS_UNAUTH:-20/minute}
      SECSCAN_RATELIMIT_SCANS_AUTH: ${SECSCAN_RATELIMIT_SCANS_AUTH:-60/hour}
      SECSCAN_GUNICORN_WORKERS: ${SECSCAN_GUNICORN_WORKERS:-2}
      SECSCAN_GUNICORN_THREADS: ${SECSCAN_GUNICORN_THREADS:-8}
      SECSCAN_GUNICORN_TIMEOUT: ${SECSCAN_GUNICORN_TIMEOUT:-120}
      SECSCAN_LOG_LEVEL: ${SECSCAN_LOG_LEVEL:-INFO}
      # Block R (ADR-0026) — Async-Ingest Feature-Flag + Per-Server-Soft-Cap.
      SECSCAN_SCAN_INGEST_ASYNC: ${SECSCAN_SCAN_INGEST_ASYNC:-false}
      SECSCAN_MAX_QUEUED_INGEST_JOBS: ${SECSCAN_MAX_QUEUED_INGEST_JOBS:-50}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Block P (ADR-0023): asynchroner LLM-Risk-Reviewer-Worker.
  # Eigener Container ohne eingehende Ports — nur DB-Connect und LLM-
  # Provider-Egress (HTTPS via openai-SDK). Image und Build-Context sind
  # identisch zum `app`-Service; der Worker laeuft mit anderem Entrypoint
  # (`python -m app.workers.llm_worker`). Healthcheck ist ein interner
  # Python-Aufruf, kein HTTP — siehe `app/workers/healthcheck.py`.
  # Worker-Settings (Mode, Token-Budget, Reset-At) leben auf der
  # Singleton-`settings`-Zeile und werden dort vom Web-Container
  # geaendert — der Worker liest sie im Tick.
  secscan-llm-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Block R (ADR-0026): Worker wartet auf `app: service_healthy` — die App
    # laeuft `alembic upgrade head` im Entrypoint und schaltet erst danach
    # auf healthy. Ohne diese Reihenfolge sieht der Worker beim Cold-Start
    # `relation "scan_ingest_jobs" does not exist` (50+ Errors bis die App
    # Migration angewendet hat). Mit `app: service_healthy` ist Migration
    # garantiert vor dem ersten Worker-Tick.
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    entrypoint: ["python", "-m", "app.workers.llm_worker"]
    environment:
      SECSCAN_ENCRYPTION_KEY: ${SECSCAN_ENCRYPTION_KEY}
      SECSCAN_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-secscan}:${POSTGRES_PASSWORD:-secscan}@db:5432/${POSTGRES_DB:-secscan}
      SECSCAN_WORKER_POLL_INTERVAL_SEC: ${SECSCAN_WORKER_POLL_INTERVAL_SEC:-2.0}
      SECSCAN_WORKER_STALE_TIMEOUT_MIN: ${SECSCAN_WORKER_STALE_TIMEOUT_MIN:-10}
      SECSCAN_LLM_TOKEN_BUDGET_DAILY: ${SECSCAN_LLM_TOKEN_BUDGET_DAILY:-1000000}
      SECSCAN_LLM_CACHE_TTL_DAYS: ${SECSCAN_LLM_CACHE_TTL_DAYS:-30}
      SECSCAN_LLM_CACHE_MAX_ROWS: ${SECSCAN_LLM_CACHE_MAX_ROWS:-100000}
      SECSCAN_LOG_LEVEL: ${SECSCAN_LOG_LEVEL:-INFO}
      # Block R (ADR-0026) — Async-Ingest Worker-Sub-Tick-Konstanten.
      SECSCAN_SCAN_INGEST_MAX_ATTEMPTS: ${SECSCAN_SCAN_INGEST_MAX_ATTEMPTS:-3}
      SECSCAN_SCAN_INGEST_STALE_TIMEOUT_MIN: ${SECSCAN_SCAN_INGEST_STALE_TIMEOUT_MIN:-5}
      SECSCAN_SCAN_INGEST_RETENTION_INTERVAL_SEC: ${SECSCAN_SCAN_INGEST_RETENTION_INTERVAL_SEC:-3600}
    healthcheck:
      # timeout: 10s — Cold-Python-Process + DB-Connect liegt unter ARM64-RKE2
      # bei ~6s gemessen (v0.9.4-Befund). 5s waren zu knapp und produzierten
      # false-unhealthy trotz funktionalem Worker. Heartbeat-Cadence intern
      # ist 10s, Schwellwert im Healthcheck 30s — die Probe-Latenz selbst
      # ist davon entkoppelt.
      test: ["CMD", "python", "-m", "app.workers.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  secscan-db:
